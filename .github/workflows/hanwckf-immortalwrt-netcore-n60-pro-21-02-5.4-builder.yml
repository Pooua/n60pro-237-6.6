name: hanwckf-immortalwrt-netcore-n60-pro-21-02-5.4-builder

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/Pooua/immortalwrt-mt798x
  REPO_BRANCH: netcore-n60-pro
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ./netcore_n60-pro/config/hanwckf-immortalwrt-21-02-5.4.config
  DIY_P1_SH: update_feeds.sh
  DIY_P2_SH: edit_config.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  FIRMWARE_TAG: hanwckf-immortalwrt-netcore-n60-pro-21-02-5.4
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $GITHUB_WORKSPACE/script/$DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/script/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $GITHUB_WORKSPACE/script/$DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/script/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        # 第一次 defconfig 建立基础环境
        make defconfig
        
        # 强行再次注入 Zabbix 配置，防止被环境依赖剔除
        # 统一使用 nossl 变体以避免 SSL 库冲突
        echo "CONFIG_PACKAGE_zabbix-proxy-nossl=y" >> .config
        echo "CONFIG_PACKAGE_zabbix-extra-agentd=y" >> .config
        echo "CONFIG_PACKAGE_zabbix-extra-sender=y" >> .config
        echo "CONFIG_PACKAGE_zabbix-extra-get=y" >> .config
        echo "CONFIG_PACKAGE_libsqlite3=y" >> .config
        
        # 第二次 defconfig 确认依赖并补全相关包
        make defconfig
        
        # 验证步骤：如果 grep 找不到配置，则停止 Action
        echo "--- 检查 Zabbix 配置状态 ---"
        grep "CONFIG_PACKAGE_zabbix-proxy-nossl=y" .config || (echo "错误: Zabbix 仍未被选中，请检查依赖冲突" && exit 1)
        
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 提取 Zabbix IPK 安装包
      id: extract_ipk
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        mkdir -p $GITHUB_WORKSPACE/zabbix_export
        find openwrt/bin/packages/ -name "zabbix-proxy*.ipk" -exec cp {} $GITHUB_WORKSPACE/zabbix_export/ \;
        find openwrt/bin/packages/ -name "libsqlite3*.ipk" -exec cp {} $GITHUB_WORKSPACE/zabbix_export/ \;
        echo "ZABBIX_PATH=$GITHUB_WORKSPACE/zabbix_export" >> $GITHUB_ENV

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Upload Zabbix Packages
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && !cancelled()
      with:
        name: Zabbix_SQLite3_IPK${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.ZABBIX_PATH }}/*.ipk

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")-${{ env.FIRMWARE_TAG }}" >> $GITHUB_OUTPUT
        touch release.txt
        echo "🔥 固件编译完成" >> release.txt
        echo "📦 Zabbix Proxy (SQLite3) 软件包已包含在附件中" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: |
          ${{ env.FIRMWARE }}/*
          ${{ env.ZABBIX_PATH }}/*.ipk

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 6
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
